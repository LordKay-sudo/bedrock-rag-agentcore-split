server:
  port: 8082

spring:
  application:
    name: orchestration-edge

edge:
  rag-base-url: http://127.0.0.1:8080
  agent-base-url: http://127.0.0.1:8081
  rate-limit:
    capacity: 30
    refill-seconds: 60
  request-guard:
    max-message-length: 2000
  budget:
    max-request-estimated-tokens: 4000
    max-daily-estimated-tokens-per-client: 200000
  cache:
    enabled: true
    ttl-seconds: 120
  resilience:
    retry-attempts: 2
    circuit-breaker-failure-threshold: 3
    circuit-breaker-cooldown-seconds: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
