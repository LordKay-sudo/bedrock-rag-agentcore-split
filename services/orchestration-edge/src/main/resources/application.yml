server:
  port: 8082

spring:
  application:
    name: orchestration-edge

edge:
  rag-base-url: http://127.0.0.1:8080
  agent-base-url: http://127.0.0.1:8081
  rate-limit:
    capacity: 30
    refill-seconds: 60
  request-guard:
    max-message-length: 2000

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
