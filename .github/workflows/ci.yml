name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rag-gateway:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/rag-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Test
        run: mvn -B verify

  agent-runtime:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/agent-runtime
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/agent-runtime/requirements-dev.txt
      - name: Install
        run: pip install -r requirements-dev.txt
      - name: Pytest
        run: pytest -q
